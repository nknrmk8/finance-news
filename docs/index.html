<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>金融・経済ニュース</title>
<meta name="description" content="信頼できる大手メディア・公的機関の公式RSSから自動収集した金融・経済ニュース">
<style>
  :root {
    --bg: #f4f5f7;
    --card: #ffffff;
    --text: #1a1d21;
    --muted: #6b7280;
    --accent: #0b62d6;
    --chip-bg: #e5e7eb;
    --chip-active: #0b62d6;
    --badge-press: #0b62d6;
    --badge-media: #0a8f5b;
    --badge-curated: #b45309;
    --badge-gov: #7c3aed;
    --border: #e5e7eb;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #101318;
      --card: #1a1f27;
      --text: #e7eaee;
      --muted: #9aa3af;
      --accent: #5ba3f5;
      --chip-bg: #2a313c;
      --border: #2a313c;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Hiragino Sans", "Yu Gothic UI", "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding-bottom: env(safe-area-inset-bottom);
  }
  header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: calc(10px + env(safe-area-inset-top)) 14px 8px;
  }
  h1 { font-size: 17px; margin: 0 0 2px; }
  #updated { font-size: 11.5px; color: var(--muted); }
  #chips {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 8px 0 2px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  #chips::-webkit-scrollbar { display: none; }
  .chip {
    flex: none;
    border: none;
    border-radius: 999px;
    background: var(--chip-bg);
    color: var(--text);
    font-size: 12.5px;
    padding: 6px 12px;
    cursor: pointer;
  }
  .chip.active { background: var(--chip-active); color: #fff; }
  main { max-width: 640px; margin: 0 auto; padding: 10px 12px 40px; }
  .card {
    display: block;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 10px;
    text-decoration: none;
    color: inherit;
  }
  .card:active { opacity: .7; }
  .meta { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .badge {
    font-size: 10.5px;
    color: #fff;
    border-radius: 4px;
    padding: 2px 6px;
    white-space: nowrap;
  }
  .b-報道機関 { background: var(--badge-press); }
  .b-経済専門メディア { background: var(--badge-media); }
  .b-編集部厳選 { background: var(--badge-curated); }
  .b-公的機関 { background: var(--badge-gov); }
  .src { font-size: 12px; color: var(--muted); }
  .time { font-size: 12px; color: var(--muted); margin-left: auto; white-space: nowrap; }
  .title { font-size: 15px; font-weight: 600; line-height: 1.45; margin: 0; }
  .summary {
    font-size: 12.5px;
    color: var(--muted);
    line-height: 1.5;
    margin: 6px 0 0;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  #status { text-align: center; color: var(--muted); padding: 40px 0; font-size: 14px; }
  footer {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    padding: 10px 16px 30px;
    line-height: 1.7;
  }
</style>
</head>
<body>
<header>
  <h1>📈 金融・経済ニュース</h1>
  <div id="updated">読み込み中…</div>
  <div id="chips"></div>
</header>
<main>
  <div id="status">読み込み中…</div>
  <div id="list"></div>
</main>
<footer>
  大手報道機関・経済専門メディア・公的機関の公式RSSのみから自動収集しています。<br>
  1時間ごとに自動更新 / タップで元記事を開きます
</footer>
<script>
const CATEGORIES = ["すべて", "報道機関", "経済専門メディア", "編集部厳選", "公的機関"];
let items = [];
let active = "すべて";

function relTime(iso) {
  if (!iso) return "";
  const diff = (Date.now() - new Date(iso).getTime()) / 60000;
  if (diff < 1) return "たった今";
  if (diff < 60) return Math.floor(diff) + "分前";
  if (diff < 1440) return Math.floor(diff / 60) + "時間前";
  return Math.floor(diff / 1440) + "日前";
}

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s || "";
  return d.innerHTML;
}

function render() {
  const list = document.getElementById("list");
  const shown = active === "すべて" ? items : items.filter(i => i.category === active);
  document.getElementById("status").style.display = shown.length ? "none" : "block";
  document.getElementById("status").textContent = shown.length ? "" : "該当する記事がありません";
  list.innerHTML = shown.map(i => `
    <a class="card" href="${esc(i.link)}" target="_blank" rel="noopener">
      <div class="meta">
        <span class="badge b-${esc(i.category)}">${esc(i.category)}</span>
        <span class="src">${esc(i.source)}</span>
        <span class="time">${relTime(i.published)}</span>
      </div>
      <p class="title">${esc(i.title)}</p>
      ${i.summary ? `<p class="summary">${esc(i.summary)}</p>` : ""}
    </a>`).join("");
}

function renderChips() {
  const box = document.getElementById("chips");
  box.innerHTML = "";
  for (const c of CATEGORIES) {
    const btn = document.createElement("button");
    btn.className = "chip" + (c === active ? " active" : "");
    btn.textContent = c;
    btn.onclick = () => { active = c; renderChips(); render(); };
    box.appendChild(btn);
  }
}

async function load() {
  try {
    const res = await fetch("data.json?t=" + Date.now());
    const data = await res.json();
    items = data.items || [];
    const t = new Date(data.generated_at);
    document.getElementById("updated").textContent =
      "最終更新: " + t.toLocaleString("ja-JP", { month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" }) +
      " / " + items.length + "件";
    render();
  } catch (e) {
    document.getElementById("status").textContent = "データの読み込みに失敗しました";
  }
}

renderChips();
load();
// 画面を開き直したとき(タブ復帰)に最新データを再取得
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible") load();
});
</script>
</body>
</html>
